name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  backend:
    name: Backend — install + smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Boot smoke test
        env:
          AI_PROVIDER: mock
          OCR_PROVIDER: mock
          JWT_SECRET: ci-secret
          MONGO_URI: mongodb://127.0.0.1:27017/reloop-ci
        run: |
          node -e "require('./ai/vision'); require('./ai/ocr'); require('./ai/llm'); require('./ai/matching'); console.log('modules ok')"
